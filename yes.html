<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>You & Me on 11/04? 😘</title>

<style>
  body {
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    text-align: center;
    font-family: Arial;
    overflow: hidden;
  }

  h1 {
    margin-top: 60px;
    margin-bottom: 5px;
    color: white;
    font-size: 45px;
    animation: pop 0.6s ease;
  }

  #text {
    color: white;
    font-size: 26px;
    margin: 5px auto;
    min-height: 40px;
  }

  img {
    width:250px;
    margin-top:10px;
    animation: bounce 1.5s infinite;
  }

  @keyframes pop {
    from { transform: scale(0.6); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .heart {
    position: fixed;
    top: -10px;
    color: white;
    font-size: 20px;
    animation: fall linear infinite;
  }

  @keyframes fall {
    to { transform: translateY(100vh); }
  }
<style>
  body {
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    text-align: center;
    font-family: Arial;
    overflow: hidden;
  }

  h1 {
    margin-top: 60px;
    margin-bottom: 5px;
    color: white;
    font-size: 45px;
    animation: pop 0.6s ease;
  }

  #text {
    color: white;
    font-size: 26px;
    margin: 5px auto;
    min-height: 40px;
  }

  /* ✅ THÊM ĐÚNG CHỖ */
  #text2 {
    color: white;
    font-size: 22px;
    margin-top: 8px;
    opacity: 0;
  }

  img {
    width:250px;
    margin-top:10px;
    animation: bounce 1.5s infinite;
  }

  @keyframes pop {
    from { transform: scale(0.6); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .heart {
    position: fixed;
    top: -10px;
    color: white;
    font-size: 20px;
    animation: fall linear infinite;
  }

  @keyframes fall {
    to { transform: translateY(100vh); }
  }
</style>
</head>

<body>

<h1>YEAHHH 😍🥰😘</h1>

<div id="text"></div>

<img src="yeah.gif">

<div id="text2"></div>


<!-- 🎵 NHẠC -->
<audio id="music" loop>
  <source src="ilmb.mp3" type="audio/mpeg">
</audio>

<script>
  // ✍️ TYPEWRITER
document.getElementById("text").innerHTML =
  "Mission successful 😎";

// 🎵 NHẠC (FIX MOBILE)
const music = document.getElementById("music");

if (localStorage.getItem("playMusic") === "true") {

  document.body.addEventListener("click", () => {

    music.volume = 0;
    music.play();

    // fade in
    let vol = 0;
    const fade = setInterval(() => {
      if (vol < 0.6) {
        vol += 0.05;
        music.volume = vol;
      } else {
        clearInterval(fade);
      }
    }, 200);

  }, { once: true });

}
  // 💖 TIM BAY
  function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = Math.random() * 3 + 2 + "s";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
  }

  setInterval(createHeart, 250);
// ✍️ TYPEWRITER TEXT 2 (delay 15s)
const message2 = "So... pick u up at 6 tomorrow nhé 😘";
let j = 0;

function typeWriter2() {
  const el = document.getElementById("text2");

  if (j === 0) {
    el.style.opacity = 1; // hiện ra trước khi gõ
  }

  if (j < message2.length) {
    el.innerHTML += message2.charAt(j);
    j++;
    setTimeout(typeWriter2, 50);
  }
}

// delay 8.5s
setTimeout(typeWriter2, 8500);
</script>

</body>
</html>
